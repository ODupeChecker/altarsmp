name: Altarly
version: 1.0.0
main: dev.altarly.AltarlyPlugin
api-version: '1.21'
authors: [Altarly]
commands:
  altarly:
    description: Altarly admin command
    usage: /altarly <reload|legs>
  removeitem:
    description: Purges a held item from stored inventories/ender chests
    usage: /removeitem
  removeitemrate:
    description: Sets purge scan rate (entries per second)
    usage: /removeitemrate <number>
  selfdestruct:
    description: Adds a 2-day self-destruct timer to held item
    usage: /selfdestruct
permissions:
  altarly.admin:
    default: op

softdepend: [BetterTeams]
