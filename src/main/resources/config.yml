CURSED_BLADE:
  ITEM:
    MATERIAL: NETHERITE_SWORD
    DISPLAY_NAME: "&5&lCursed Blade"
    CUSTOM_MODEL_DATA: 15
    LORE:
      - "&7Legendary weapon of the tower."
      - "&8Offhand: Ruined Slash"
      - "&8Shift+Offhand: Ruinstep"

  PVP_ASPECTS:
    DAMAGE_ENGINE: "TRUE_DAMAGE"
    HIT_PLAYERS_ONLY: true
    FRIENDLY_FIRE: true

  SOUND_BROADCAST_RADIUS: 15.0

  ABILITIES:
    RUINED_SLASH:
      ENABLED: true
      ABILITY_NAME: "Ruined Slash"
      TRIGGER: "OFFHAND_SWAP"
      SHIFT_REQUIRED: false
      COOLDOWN_MILLIS: 5000
      START_OFFSET_BLOCKS: 1
      DISTANCE_BLOCKS: 7
      TRUE_DAMAGE: 5.0
      HIT_RADIUS: 0.65
      MM_MOB: "TOWER_SKELETON_SLASH_FX:1"
      MM_WORLD: "worldo12"
      SOUND: "littleroom_towerskeleton:sword_hit"
      SOUND_SECONDARY: "minecraft:entity.player.attack.sweep"

    RUINSTEP:
      ENABLED: true
      ABILITY_NAME: "Ruinstep"
      TRIGGER: "OFFHAND_SWAP"
      SHIFT_REQUIRED: true
      COOLDOWN_MILLIS: 9000
      DASH_SPEED: 1.85
      LIFT_VELOCITY: 0.42
      MIN_AIR_TICKS: 5
      FLAME_OFFSET_BLOCKS: 0.9
      FLAME_HEIGHT_OFFSET: 0.1
      FLAME_SCALE: 4.0
      HIT_RADIUS: 0.75
      TRUE_DAMAGE: 3.0
      DASH_SOUND: "minecraft:entity.blaze.shoot"
      DASH_SOUND_SECONDARY: "minecraft:entity.player.attack.knockback"

  COMMANDS:
    RELOAD:
      ENABLED: true
      ALIAS: "reload"
      OP_ONLY: true
    LEGS:
      ENABLED: true
      ALIAS: "legs"
      OP_ONLY: true
      INVENTORY_TITLE: "Legendary Weapons"
      INVENTORY_TYPE: "CHEST"
      GIVE_ITEM_SLOT: 0

  MESSAGES:
    PREFIX: "&8[&5Altarly&8] "
    NO_PERMISSION: "&cYou do not have permission."
    PLAYER_ONLY: "&cOnly players can use this command."
    RELOAD_SUCCESS: "&aAltarly config reloaded."
    SLASH_COOLDOWN: "&cRuined Slash is on cooldown."
    RUINSTEP_COOLDOWN: "&cRuinstep is on cooldown."

