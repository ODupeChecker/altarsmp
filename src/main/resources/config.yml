    PLAYER_ONLY: "&cOnly players can use this command."
    RELOAD_SUCCESS: "&aAltarly config reloaded."
    SLASH_COOLDOWN: "&cRuined Slash is on cooldown."
    RUINSTEP_COOLDOWN: "&cRuinstep is on cooldown."

